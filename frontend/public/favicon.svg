<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Back tile (the "stack") -->
  <rect x="9" y="10" width="19" height="19" rx="5" fill="#e8cfa0" stroke="#b07b12" stroke-width="1.5"/>
  <!-- Front tile with the W wordmark -->
  <rect x="4" y="4" width="20" height="20" rx="5" fill="#f6e9d2" stroke="#b07b12" stroke-width="2"/>
  <!-- bottom edge to hint tile depth -->
  <path d="M5.5 20.5 h17" stroke="#d8b878" stroke-width="2" stroke-linecap="round"/>
  <text x="14" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="14" font-weight="700" fill="#412404">W</text>
</svg>
